<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Electrónicos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Registro de Productos Electrónicos</h1>
    
    <form id="formProducto">
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="number" id="precio" placeholder="Precio" step="0.01" required>
        <input type="number" id="stock" placeholder="Stock" required>
        <input type="text" id="imagen" placeholder="URL de la imagen (opcional)">
        <button type="submit">Guardar Producto</button>
    </form>

    <div id="mensaje"></div>

    <h2>Lista de Inventario</h2>
    <ul id="listaProductos"></ul>

    <script src="script.js"></script>
</body>
</html>
